<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Museu VR - Galeria de Arte Imersiva</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Georgia', 'Times New Roman', serif;
            overflow: hidden;
            background-color: #1a1a2e;
        }
        
        /* Instruções flutuantes para o usuário */
        #info-panel {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(8px);
            color: #f0e6d0;
            padding: 12px 20px;
            border-radius: 12px;
            font-size: 14px;
            z-index: 100;
            pointer-events: none;
            font-family: monospace;
            border-left: 4px solid #d4af37;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        #controls-guide {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            color: #ccc;
            padding: 10px 16px;
            border-radius: 12px;
            font-size: 12px;
            z-index: 100;
            pointer-events: none;
            font-family: monospace;
            text-align: right;
            border-right: 3px solid #d4af37;
        }
        
        #title-card {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(10px);
            color: #d4af37;
            padding: 8px 24px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            letter-spacing: 2px;
            z-index: 100;
            pointer-events: none;
            font-family: 'Georgia', serif;
            text-transform: uppercase;
            border: 1px solid rgba(212,175,55,0.5);
        }
        
        @media (max-width: 600px) {
            #info-panel, #controls-guide { font-size: 10px; padding: 8px 12px; }
            #title-card { font-size: 12px; top: 12px; }
        }
        
        /* Botão para alternar instruções (opcional) */
        .toggle-btn {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: #d4af37;
            color: #1a1a2e;
            border: none;
            border-radius: 20px;
            padding: 5px 12px;
            font-size: 10px;
            cursor: pointer;
            z-index: 101;
            font-weight: bold;
            pointer-events: auto;
        }
    </style>
</head>
<body>
    <div id="title-card">🖼️ MUSEU VIRTUAL • GALERIA IMPERIAL</div>
    <div id="info-panel">
        🎨 MUSEU IMERSIVO | 12 Obras Monumentais
    </div>
    <div id="controls-guide">
        🖱️ MOUSE: Olhe ao redor<br>
        ⌨️ WASD / SETAS: Movimentação<br>
        🎮 QUEST 2: Controles nativos<br>
        🏃‍♂️ Clique na tela para travar o mouse
    </div>
    
    <!-- Importação do A-Frame e extras para navegação completa -->
    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <!-- Componentes de movimento e controles -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-extras@6.1.1/dist/aframe-extras.min.js"></script>
    <!-- Física e colisão suave -->
    <script src="https://cdn.jsdelivr.net/npm/aframe-physics-system@4.0.1/dist/aframe-physics-system.min.js"></script>
    
    <script>
        // ==================== CONFIGURAÇÃO DAS OBRAS ====================
        // Coleção de fotografias de alta resolução (arte, paisagens, cultura)
        const masterpieces = [
            { url: "https://picsum.photos/id/20/2048/1536", title: "Café e Alma", artist: "Anônimo" },
            { url: "https://picsum.photos/id/104/2048/1536", title: "Cachoeira Eterna", artist: "Natureza Viva" },
            { url: "https://picsum.photos/id/107/2048/1536", title: "Campo de Sonhos", artist: "Luz da Manhã" },
            { url: "https://picsum.photos/id/116/2048/1536", title: "Lago dos Cisnes", artist: "Montanhas Reflexivas" },
            { url: "https://picsum.photos/id/15/2048/1536", title: "Verde Silêncio", artist: "Folhas de Outono" },
            { url: "https://picsum.photos/id/169/2048/1536", title: "Pôr do Sol Dourado", artist: "Crepúsculo Infinito" },
            { url: "https://picsum.photos/id/26/2048/1536", title: "Veneza Noturna", artist: "Canais Antigos" },
            { url: "https://picsum.photos/id/29/2048/1536", title: "Arquitetura Abstrata", artist: "Linhas Urbanas" },
            { url: "https://picsum.photos/id/39/2048/1536", title: "Metrópole Iluminada", artist: "Luzes da Cidade" },
            { url: "https://picsum.photos/id/42/2048/1536", title: "Melodia ao Piano", artist: "Notas Musicais" },
            { url: "https://picsum.photos/id/58/2048/1536", title: "Estrada Infinita", artist: "Horizonte Aberto" },
            { url: "https://picsum.photos/id/66/2048/1536", title: "Floresta Encantada", artist: "Verde Profundo" },
            { url: "https://picsum.photos/id/96/2048/1536", title: "Alpes Glaciais", artist: "Neve Eterna" },
            { url: "https://picsum.photos/id/155/2048/1536", title: "Cascata Gelada", artist: "Água Pura" },
            { url: "https://picsum.photos/id/192/2048/1536", title: "Caminho Rural", artist: "Terra e Céu" },
            { url: "https://picsum.photos/id/210/2048/1536", title: "Girafas Africanas", artist: "Savana Mágica" },
            { url: "https://picsum.photos/id/227/2048/1536", title: "Construção Moderna", artist: "Cimento e Vidro" },
            { url: "https://picsum.photos/id/238/2048/1536", title: "Tóquio à Noite", artist: "Neon Dreams" },
            { url: "https://picsum.photos/id/24/2048/1536", title: "Ponte Suspensa", artist: "Engenharia e Arte" },
            { url: "https://picsum.photos/id/1015/2048/1536", title: "Montanha Mística", artist: "Picos Nevados" }
        ];
        
        // Embaralhar para variedade e pegar 12 obras
        function shuffleArray(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }
        
        const shuffledArt = shuffleArray([...masterpieces]);
        const selectedArt = shuffledArt.slice(0, 12);
        
        // Configurações do museu
        const frameW = 3.0;      // largura do quadro
        const frameH = 2.4;      // altura
        const wallDist = 6.2;    // distância das paredes ao centro
        const pedestalHeight = 0.4;
        
        // Função para criar um quadro com moldura clássica de museu
        function createMuseumFrame(imgUrl, x, y, z, rotY, rotX = 0, artTitle = "Obra", artist = "Artista") {
            const scene = document.querySelector('a-scene');
            const group = document.createElement('a-entity');
            group.setAttribute('position', `${x} ${y} ${z}`);
            group.setAttribute('rotation', `${rotX} ${rotY * (180/Math.PI)} 0`);
            
            // Moldura externa (dourada e elegante)
            const outerFrame = document.createElement('a-box');
            outerFrame.setAttribute('width', `${frameW + 0.2}`);
            outerFrame.setAttribute('height', `${frameH + 0.2}`);
            outerFrame.setAttribute('depth', '0.12');
            outerFrame.setAttribute('color', '#c9a84c');
            outerFrame.setAttribute('material', 'metalness: 0.85; roughness: 0.25; color: #d4af37');
            outerFrame.setAttribute('position', '0 0 0');
            group.appendChild(outerFrame);
            
            // Moldura interna (escura)
            const innerFrame = document.createElement('a-box');
            innerFrame.setAttribute('width', `${frameW + 0.05}`);
            innerFrame.setAttribute('height', `${frameH + 0.05}`);
            innerFrame.setAttribute('depth', '0.08');
            innerFrame.setAttribute('color', '#2c1a0c');
            innerFrame.setAttribute('material', 'metalness: 0.6; roughness: 0.4; color: #5a3e1b');
            innerFrame.setAttribute('position', '0 0 0.03');
            group.appendChild(innerFrame);
            
            // A tela com a fotografia
            const canvas = document.createElement('a-plane');
            canvas.setAttribute('width', `${frameW - 0.1}`);
            canvas.setAttribute('height', `${frameH - 0.1}`);
            canvas.setAttribute('position', '0 0 0.1');
            canvas.setAttribute('material', `src: url(${imgUrl}); shader: standard; side: double; roughness: 0.15; metalness: 0.05`);
            canvas.setAttribute('color', '#ffffff');
            group.appendChild(canvas);
            
            // Vidro protetor (leve brilho)
            const glass = document.createElement('a-plane');
            glass.setAttribute('width', `${frameW - 0.08}`);
            glass.setAttribute('height', `${frameH - 0.08}`);
            glass.setAttribute('position', '0 0 0.12');
            glass.setAttribute('material', 'transparent: true; opacity: 0.12; color: #aaccff; metalness: 0.9; roughness: 0.1');
            glass.setAttribute('side', 'double');
            group.appendChild(glass);
            
            // Placa de identificação (pequena plaqueta abaixo do quadro)
            const plaque = document.createElement('a-plane');
            plaque.setAttribute('width', '1.2');
            plaque.setAttribute('height', '0.25');
            plaque.setAttribute('position', `0 ${-(frameH/2 + 0.2)} 0.13`);
            plaque.setAttribute('color', '#2c2c2c');
            plaque.setAttribute('material', 'metalness: 0.3; roughness: 0.5; color: #3a3a3a');
            group.appendChild(plaque);
            
            // Texto da placa (usando texto 3D simples, porém aframe-text é mais leve)
            const textEntity = document.createElement('a-text');
            textEntity.setAttribute('value', `${artTitle} | ${artist}`);
            textEntity.setAttribute('color', '#d4af37');
            textEntity.setAttribute('align', 'center');
            textEntity.setAttribute('width', '1.1');
            textEntity.setAttribute('position', `0 ${-(frameH/2 + 0.2)} 0.18`);
            textEntity.setAttribute('scale', '0.08 0.08 0.08');
            textEntity.setAttribute('font', 'roboto');
            group.appendChild(textEntity);
            
            scene.appendChild(group);
        }
        
        // Construir o museu completo
        function buildMuseum() {
            const scene = document.querySelector('a-scene');
            if (!scene) {
                setTimeout(buildMuseum, 100);
                return;
            }
            
            // Distribuição das 12 obras: 3 por parede
            // Parede Frontal (Z negativo)
            const frontArt = selectedArt.slice(0, 3);
            const frontX = [-3.0, 0, 3.0];
            frontArt.forEach((art, idx) => {
                createMuseumFrame(art.url, frontX[idx], 1.2, -wallDist, 0, 0, art.title, art.artist);
            });
            
            // Parede Traseira (Z positivo)
            const backArt = selectedArt.slice(3, 6);
            const backX = [-3.0, 0, 3.0];
            backArt.forEach((art, idx) => {
                createMuseumFrame(art.url, backX[idx], 1.2, wallDist, Math.PI, 0, art.title, art.artist);
            });
            
            // Parede Esquerda (X negativo)
            const leftArt = selectedArt.slice(6, 9);
            const leftZ = [-3.0, 0, 3.0];
            leftArt.forEach((art, idx) => {
                createMuseumFrame(art.url, -wallDist, 1.2, leftZ[idx], Math.PI/2, 0, art.title, art.artist);
            });
            
            // Parede Direita (X positivo)
            const rightArt = selectedArt.slice(9, 12);
            const rightZ = [-3.0, 0, 3.0];
            rightArt.forEach((art, idx) => {
                createMuseumFrame(art.url, wallDist, 1.2, rightZ[idx], -Math.PI/2, 0, art.title, art.artist);
            });
            
            // Adicionar pedestais decorativos com esculturas (esferas douradas simulando arte)
            const pedestalPositions = [
                [-2.5, 0, -2.5], [2.5, 0, -2.5], [-2.5, 0, 2.5], [2.5, 0, 2.5],
                [-1.8, 0, -1.8], [1.8, 0, 1.8]
            ];
            pedestalPositions.forEach(pos => {
                const pedestal = document.createElement('a-cylinder');
                pedestal.setAttribute('position', `${pos[0]} ${pedestalHeight/2} ${pos[2]}`);
                pedestal.setAttribute('radius', '0.45');
                pedestal.setAttribute('height', `${pedestalHeight}`);
                pedestal.setAttribute('color', '#b89a5c');
                pedestal.setAttribute('material', 'roughness: 0.4; metalness: 0.5');
                scene.appendChild(pedestal);
                
                // Escultura abstrata (esfera + torus)
                const sculpture = document.createElement('a-entity');
                sculpture.setAttribute('position', `${pos[0]} ${pedestalHeight + 0.4} ${pos[2]}`);
                const sphere = document.createElement('a-sphere');
                sphere.setAttribute('radius', '0.28');
                sphere.setAttribute('color', '#d4af37');
                sphere.setAttribute('material', 'metalness: 0.9; roughness: 0.2');
                sculpture.appendChild(sphere);
                
                const ring = document.createElement('a-torus');
                ring.setAttribute('radius', '0.35');
                ring.setAttribute('radius-tubular', '0.05');
                ring.setAttribute('color', '#ffdd99');
                ring.setAttribute('material', 'metalness: 0.8');
                ring.setAttribute('rotation', '90 0 0');
                sculpture.appendChild(ring);
                scene.appendChild(sculpture);
            });
            
            // Piso de mármore (com reflexo suave)
            const floor = document.createElement('a-plane');
            floor.setAttribute('position', '0 -0.05 0');
            floor.setAttribute('rotation', '-90 0 0');
            floor.setAttribute('width', '16');
            floor.setAttribute('height', '16');
            floor.setAttribute('color', '#e8e0d0');
            floor.setAttribute('material', 'roughness: 0.35; metalness: 0.25; repeat: 4 4; src: https://threejs.org/examples/textures/uv_grid_opengl.jpg');
            floor.setAttribute('repeat', '8 8');
            floor.setAttribute('receive-shadow', 'true');
            scene.appendChild(floor);
            
            // Tapete central vermelho (estilo museu)
            const carpet = document.createElement('a-plane');
            carpet.setAttribute('position', '0 0.02 0');
            carpet.setAttribute('rotation', '-90 0 0');
            carpet.setAttribute('width', '5.5');
            carpet.setAttribute('height', '5.5');
            carpet.setAttribute('color', '#8b2c1a');
            carpet.setAttribute('material', 'roughness: 0.6; metalness: 0.05; color: #a33b24');
            scene.appendChild(carpet);
            
            // Teto com claraboia
            const ceiling = document.createElement('a-plane');
            ceiling.setAttribute('position', '0 4.0 0');
            ceiling.setAttribute('rotation', '90 0 0');
            ceiling.setAttribute('width', '14');
            ceiling.setAttribute('height', '14');
            ceiling.setAttribute('color', '#f5f0e0');
            ceiling.setAttribute('material', 'transparent: true; opacity: 0.25; side: double');
            scene.appendChild(ceiling);
            
            // Colunas decorativas nos cantos (estilo neoclássico)
            const columnPos = [
                [-5.5, 0, -5.5], [5.5, 0, -5.5], [-5.5, 0, 5.5], [5.5, 0, 5.5]
            ];
            columnPos.forEach(pos => {
                const column = document.createElement('a-cylinder');
                column.setAttribute('position', `${pos[0]} 1.8 ${pos[2]}`);
                column.setAttribute('radius', '0.45');
                column.setAttribute('height', '3.6');
                column.setAttribute('color', '#e8ddd0');
                column.setAttribute('material', 'roughness: 0.3; metalness: 0.1');
                scene.appendChild(column);
                
                const capital = document.createElement('a-cylinder');
                capital.setAttribute('position', `${pos[0]} 3.5 ${pos[2]}`);
                capital.setAttribute('radius', '0.55');
                capital.setAttribute('height', '0.25');
                capital.setAttribute('color', '#d4af37');
                capital.setAttribute('material', 'metalness: 0.7');
                scene.appendChild(capital);
            });
            
            // Iluminação refinada
            // Luz ambiente quente
            const ambient = document.createElement('a-light');
            ambient.setAttribute('type', 'ambient');
            ambient.setAttribute('color', '#404060');
            ambient.setAttribute('intensity', '0.55');
            scene.appendChild(ambient);
            
            // Luz principal (spot central)
            const mainLight = document.createElement('a-light');
            mainLight.setAttribute('type', 'point');
            mainLight.setAttribute('position', '0 3.8 0');
            mainLight.setAttribute('color', '#fff5e0');
            mainLight.setAttribute('intensity', '0.9');
            mainLight.setAttribute('distance', '15');
            scene.appendChild(mainLight);
            
            // Spots direcionados para as paredes (realçar quadros)
            const spotPositions = [
                [-3, 3, -5.8], [0, 3, -5.8], [3, 3, -5.8],
                [-3, 3, 5.8], [0, 3, 5.8], [3, 3, 5.8],
                [-5.8, 3, -3], [-5.8, 3, 0], [-5.8, 3, 3],
                [5.8, 3, -3], [5.8, 3, 0], [5.8, 3, 3]
            ];
            spotPositions.forEach(pos => {
                const spot = document.createElement('a-light');
                spot.setAttribute('type', 'spot');
                spot.setAttribute('position', `${pos[0]} ${pos[1]} ${pos[2]}`);
                spot.setAttribute('color', '#ffdd99');
                spot.setAttribute('intensity', '0.65');
                spot.setAttribute('distance', '9');
                spot.setAttribute('angle', '45');
                spot.setAttribute('penumbra', '0.4');
                scene.appendChild(spot);
            });
            
            // Luz de preenchimento suave
            const fillLight = document.createElement('a-light');
            fillLight.setAttribute('type', 'point');
            fillLight.setAttribute('position', '-3 2 3');
            fillLight.setAttribute('color', '#ccaa88');
            fillLight.setAttribute('intensity', '0.4');
            scene.appendChild(fillLight);
            
            const fillLight2 = document.createElement('a-light');
            fillLight2.setAttribute('type', 'point');
            fillLight2.setAttribute('position', '3 2 -2');
            fillLight2.setAttribute('color', '#88aacc');
            fillLight2.setAttribute('intensity', '0.4');
            scene.appendChild(fillLight2);
            
            // Elementos decorativos: bancos para apreciar a arte
            const benchPositions = [[-2, 0, -1.5], [2, 0, 1.2], [0, 0, -2.2]];
            benchPositions.forEach(pos => {
                const bench = document.createElement('a-box');
                bench.setAttribute('position', `${pos[0]} 0.2 ${pos[2]}`);
                bench.setAttribute('width', '0.9');
                bench.setAttribute('height', '0.4');
                bench.setAttribute('depth', '0.5');
                bench.setAttribute('color', '#6b4c3b');
                bench.setAttribute('material', 'roughness: 0.7');
                scene.appendChild(bench);
            });
        }
        
        // Inicialização e configuração de controles
        window.addEventListener('load', () => {
            setTimeout(() => {
                buildMuseum();
                setupMovementAndPointerLock();
            }, 200);
        });
        
        // Função para garantir que mouse/keyboard funcionem perfeitamente
        function setupMovementAndPointerLock() {
            const scene = document.querySelector('a-scene');
            const cameraRig = document.querySelector('#rig') || (() => {
                // Se não existir rig, criar estrutura adequada
                const existingCam = document.querySelector('a-camera');
                if (existingCam && !existingCam.parentElement.classList?.contains('rig')) {
                    const rig = document.createElement('a-entity');
                    rig.id = 'rig';
                    rig.setAttribute('position', '0 0 0');
                    rig.setAttribute('movement-controls', 'speed: 1.5; fly: false; controls: gamepad, keyboard');
                    existingCam.parentElement.insertBefore(rig, existingCam);
                    rig.appendChild(existingCam);
                    existingCam.setAttribute('position', '0 1.6 0');
                    return rig;
                }
                return document.querySelector('#rig');
            })();
            
            if (cameraRig && !cameraRig.hasAttribute('movement-controls')) {
                cameraRig.setAttribute('movement-controls', 'speed: 1.5; fly: false; controls: gamepad, keyboard');
            }
            
            // Ativar pointer lock ao clicar na tela (para mouse look)
            const canvas = document.querySelector('canvas');
            if (canvas) {
                canvas.addEventListener('click', () => {
                    canvas.requestPointerLock = canvas.requestPointerLock || canvas.mozRequestPointerLock;
                    if (canvas.requestPointerLock) {
                        canvas.requestPointerLock();
                    }
                });
            }
            
            // Configurar look-controls para mouse/teclado
            const camera = document.querySelector('a-camera');
            if (camera && camera.components['look-controls']) {
                camera.setAttribute('look-controls', 'pointerLockEnabled: true; reverseMouseDrag: false');
            }
            
            // Pequeno helper: exibir no console que os controles estão ativos
            console.log('🎮 Museu VR: Navegação WASD + Mouse + Controles Quest 2 ativados');
        }
        
        // Garantir que o movement-controls seja aplicado também após carregamento dos componentes
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                const rig = document.querySelector('#rig');
                if (rig && !rig.components['movement-controls']) {
                    rig.setAttribute('movement-controls', 'speed: 1.5; fly: false; controls: gamepad, keyboard');
                }
            }, 500);
        });
    </script>
    
    <!-- Cena principal com layout de museu -->
    <a-scene 
        background="color: #0f0f1a" 
        shadow="type: pcfsoft; intensity: 0.8"
        physics="gravity: 0; debug: false"
        vr-mode-ui="enabled: true"
        device-orientation-permission-ui="enabled: false"
        loading-screen="dotsColor: #d4af37; backgroundColor: #0a0a14">
        
        <!-- Entidade principal de navegação (câmera + controles) -->
        <a-entity id="rig" position="0 0 0" movement-controls="speed: 1.5; fly: false; controls: gamepad, keyboard">
            <a-camera id="camera" position="0 1.6 0" look-controls="pointerLockEnabled: true; reverseMouseDrag: false">
                <!-- Cursor interativo simples para dar feedback visual -->
                <a-entity id="cursor-ring" position="0 0 -0.8" geometry="primitive: ring; radiusInner: 0.02; radiusOuter: 0.03" material="color: #d4af37; shader: flat" opacity="0.7">
                    <a-animation attribute="scale" begin="click" dur="100" fill="forwards" from="1 1 1" to="1.4 1.4 1.4" direction="alternate" repeat="1"></a-animation>
                </a-entity>
            </a-camera>
        </a-entity>
        
        <!-- Piso base com colisão simples (invisível) -->
        <a-plane position="0 -0.1 0" rotation="-90 0 0" width="18" height="18" color="#fff" visible="false" physics="type: static; mass: 0"></a-plane>
        
        <!-- Efeito de partículas sutis no ar (poeira de museu) -->
        <a-entity position="0 1.5 0">
            <a-particle-system preset="dust" color="#c9b68c" particle-count="120" opacity="0.12" size="0.06" velocity-value="0 0.05 0"></a-particle-system>
        </a-entity>
        
        <!-- Música ambiente / som de galeria silenciosa (opcional) -->
        <a-entity sound="src: url(https://cdn.pixabay.com/download/audio/2022/03/10/audio_c8c8c8c8c8.mp3?filename=gallery-ambience-109585.mp3); autoplay: false; loop: true; volume: 0.0" id="bg-sound"></a-entity>
        <!-- Nota: som desativado por padrão, sem poluição auditiva. -->
    </a-scene>
    
    <script>
        // Ajustes finos para melhor experiência no Meta Quest 2 + mouse
        (function optimizeVR() {
            const scene = document.querySelector('a-scene');
            if (!scene) return;
            
            scene.addEventListener('enter-vr', () => {
                console.log('🔮 Modo VR ativado - Meta Quest 2 detectado');
                const renderer = scene.renderer;
                if (renderer) {
                    renderer.shadowMap.type = 1; // performance
                    renderer.setPixelRatio(1.0);
                }
                // Ajustar velocidade de movimento para VR
                const rig = document.querySelector('#rig');
                if (rig && rig.components['movement-controls']) {
                    rig.setAttribute('movement-controls', 'speed: 1.2');
                }
            });
            
            scene.addEventListener('exit-vr', () => {
                const rig = document.querySelector('#rig');
                if (rig && rig.components['movement-controls']) {
                    rig.setAttribute('movement-controls', 'speed: 1.5');
                }
            });
            
            // Ativar pointer lock automaticamente ao clicar no canvas
            const canvas = document.querySelector('canvas');
            if (canvas) {
                canvas.style.cursor = 'crosshair';
                canvas.addEventListener('click', () => {
                    if (document.pointerLockElement !== canvas) {
                        canvas.requestPointerLock();
                    }
                });
            }
        })();
    </script>
</body>
</html>
